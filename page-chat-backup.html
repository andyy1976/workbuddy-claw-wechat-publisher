<div class="page" id="page-chat">
                    <div class="card-header">
                        <span class="card-title">💬 智能对话</span>
                        <div class="flex-row gap-sm">
                            <select class="form-select" id="chatModel" style="width:220px;">
                                <option value="">选择模型...</option>
                                <option value="coral">匿名模型 - Coral</option>
                                <option value="lavender">匿名模型 - Lavender</option>
                                <option value="maroon">匿名模型 - Maroon</option>
                                <option value="teal">匿名模型 - Teal</option>
                                <option value="deepseek">DeepSeek (OpenAI 兼容)</option>
                                <option value="openai">OpenAI GPT-4</option>
                                <option value="claude">Claude (Anthropic)</option>
                                <option value="gemini">Gemini (Google)</option>
                                <option value="qwen">通义千问 (阿里)</option>
                                <option value="chatglm">ChatGLM (智谱)</option>
                            </select>
                            <button class="btn btn-sm" onclick="clearChat()">🗑️ 清空对话</button>
                        </div>
                    </div>
                    <div id="chatMessages" style="height:420px; overflow-y:auto; padding:16px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px;">
                        <div class="message bot-message" style="margin-bottom:12px; padding:10px 14px; background:var(--surface2); border-radius:8px; max-width:80%; color:var(--text);">👋 你好!我是 WorkBuddy 智能助手。有什么可以帮你?</div>
                    </div>
                    <div class="flex-row gap-sm">
                        <input class="form-input" id="chatInput" placeholder="输入消息,按 Ctrl+Enter 发送..." onkeydown="handleChatKeydown(event)">
                        <button class="btn btn-primary" onclick="sendMessage()">📤 发送</button>
                    </div>
                </div>
