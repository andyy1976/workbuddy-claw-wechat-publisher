<div class="page" id="page-models">
                    <div class="card mb-md">
                        <div class="card-header">
                            <span class="card-title">模型配置</span>
                            <button class="btn btn-sm btn-success" onclick="loadModelList()">刷新列表</button>
                        </div>
                        <div id="currentModelBadge" style="padding:8px 16px; background:var(--surface2); border-radius:6px; margin-bottom:12px; font-size:14px; display:none;">
                            当前使用: <strong id="currentModelName">-</strong>
                        </div>
                        <div class="table-responsive">
                        <table class="data-table" id="modelTable">
                            <thead>
                                <tr>
                                    <th>模型名称</th>
                                    <th>API URL</th>
                                    <th>优先级</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="modelList">
                            </tbody>
                        </table>
                    </div>
                    <div id="modelListEmpty" style="display:none; padding:20px; text-align:center; color:var(--text2);">暂无配置的模型,请在下方添加。</div>
                    </div>

                    <div class="card">
                        <div class="card-header"><span class="card-title">添加/更新模型</span></div>
                        <div class="form-group" style="margin-bottom:16px;">
                            <label class="form-label">选择模型</label>
                            <select class="form-select" id="configModelSelect" style="width:100%;">
                                <option value="">-- 请选择模型 --</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom:16px;">
                            <label class="form-label">API Key</label>
                            <input class="form-input" id="configApiKey" type="password" placeholder="sk-... (输入您的API Key)">
                            <div style="font-size:12px; color:var(--text2); margin-top:4px;">提示:API Key 将安全保存在服务器,不会显示在界面上</div>
                        </div>
                        <div class="flex-row mt-md">
                            <button class="btn btn-success" onclick="saveApiKey()">保存配置</button>
                            <button class="btn btn-sm" onclick="testConnection()">测试连接</button>
                        </div>
                        <div id="testResult" style="display:none; margin-top:12px; padding:12px; background:var(--bg); border-radius:6px; font-size:12px; white-space:pre-wrap;"></div>
                    </div>
                </div>
