<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS设置 - WorkBuddy</title>
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <h1>🚀 WorkBuddy</h1>
        <p>内容数字员工平台 v6.0</p>
      </div>
      <nav class="sidebar-nav" id="mainNav"></nav>
      <div class="sidebar-footer">
        <div class="status"><span class="dot"></span><span id="serverStatus">服务运行中</span></div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <h2>🔗 CMS设置</h2>
        <div class="topbar-actions">
          <button class="btn btn-outline" onclick="healthCheck()">健康检查</button>
          <button class="btn btn-primary" onclick="loadCMS()"><span>+</span> 刷新</button>
        </div>
      </header>

      <div class="content">

        <!-- 统计卡片 -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="label">栏目总数</div>
            <div class="value" id="cmsCatCount">0</div>
          </div>
          <div class="stat-card">
            <div class="label">数据来源</div>
            <div class="value" id="cmsSource" style="font-size:16px;">检查中...</div>
          </div>
        </div>

        <!-- 栏目列表 -->
        <div class="card" style="margin-bottom:20px;">
          <div class="card-header"><span class="card-title">📂 CMS栏目映射</span></div>
          <div id="cmsCategories"></div>
          <div id="cmsEmpty" style="display:none; padding:24px; text-align:center; color:var(--text2);">暂无栏目数据</div>
        </div>

      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="/js/common.js"></script>
  <script>
    // ── 健康检查 ─────────────────────────────────
    async function healthCheck() {
      try {
        var r = await fetch('/api/health');
        var d = await r.json();
        document.getElementById('serverStatus').textContent = '运行中 (' + Math.round(d.uptime) + 's)';
        showToast('✅ 服务正常 v' + d.version);
      } catch (e) {
        document.getElementById('serverStatus').textContent = '离线';
        showToast('❌ 服务未启动', 'error');
      }
    }

    // ── Toast ────────────────────────────────────
    function showToast(msg, type) {
      type = type || 'success';
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      setTimeout(function() { t.classList.add('show'); }, 10);
      setTimeout(function() { t.classList.remove('show'); }, 3500);
    }

    // ── 加载CMS栏目（对齐旧版逻辑） ───────────────
    async function loadCMS() {
      try {
        var r = await fetch(API + '/api/cms/categories');
        var d = await r.json();

        console.log('[cms] categories API:', d);

        // 后端返回: { success:true, data: { "111":{name,keywords}, "112":{...} }, source:"database|fallback" }
        var cats = d.data || {};
        var catKeys = Object.keys(cats).filter(function(k) { return k !== '_selected'; });

        // 统计
        document.getElementById('cmsCatCount').textContent = catKeys.length;

        // 来源状态
        var sourceEl = document.getElementById('cmsSource');
        if (d.source === 'database') {
          sourceEl.innerHTML = '<span style="color:var(--success);">✅ 数据库连接正常</span>';
        } else if (d.source === 'fallback') {
          sourceEl.innerHTML = '<span style="color:#f0a500;">⚠️ 使用本地配置（数据库不可用）</span>';
        } else if (d.source === 'config') {
          sourceEl.textContent = '✅ 正常';
        } else {
          sourceEl.innerHTML = '<span style="color:var(--danger);">❌ 离线</span>';
        }

        // 渲染表格
        var container = document.getElementById('cmsCategories');
        var emptyEl = document.getElementById('cmsEmpty');

        if (!catKeys.length) {
          container.innerHTML = '';
          emptyEl.style.display = 'block';
          return;
        }
        emptyEl.style.display = 'none';

        var tableHtml = '<table class="data-table"><thead><tr><th>ID</th><th>栏目名</th><th>关键词</th></tr></thead><tbody>';
        catKeys.forEach(function(id) {
          var c = cats[id];
          var kwStr = (c.keywords && Array.isArray(c.keywords)) ? c.keywords.join(', ') : '-';
          tableHtml += '<tr>'
            + '<td><strong>' + id + '</strong></td>'
            + '<td>' + (c.name || '-') + '</td>'
            + '<td style="font-size:12px;color:var(--text2);max-width:300px;overflow:hidden;text-overflow:ellipsis;" title="' + kwStr + '">' + kwStr + '</td>'
            + '</tr>';
        });
        tableHtml += '</tbody></table>';
        container.innerHTML = tableHtml;


        console.log('[cms] Loaded', catKeys.length, 'categories, source:', d.source);

      } catch (e) {
        console.error('[cms] loadCMS error:', e);
        document.getElementById('cmsSource').innerHTML = '<span style="color:var(--danger);">❌ 连接失败</span>';
        document.getElementById('cmsCategories').innerHTML = '';
        document.getElementById('cmsEmpty').style.display = 'block';
        document.getElementById('cmsEmpty').textContent = '加载失败: ' + e.message;
        showToast('加载CMS失败: ' + e.message, 'error');
      }
    }

    // ── 页面加载 ─────────────────────────────────
    document.addEventListener('DOMContentLoaded', function() {
      loadCMS();
      healthCheck();
    });
  </script>
</body>
</html>
